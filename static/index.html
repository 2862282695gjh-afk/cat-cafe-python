      const [expanded, setExpanded] = useState(false);
      const [selectedMcpTools, setSelectedMcpTools] = useState(currentAuth?.mcpTools || []);
      const [selectedSkills, setSelectedSkills] = useState(currentAuth?.skills || []);

      useEffect(() => {
        setSelectedMcpTools(currentAuth?.mcpTools || []);
        setSelectedSkills(currentAuth?.skills || []);
      }, [currentAuth]);

      const handleToggleMcpTool = (toolId) => {
        const updated = selectedMcpTools.includes(toolId)
          ? selectedMcpTools.filter(id => id !== toolId)
          : [...selectedMcpTools, toolId];
        setSelectedMcpTools(updated);
      };

      const handleToggleSkill = (skillId) => {
        const updated = selectedSkills.includes(skillId)
          ? selectedSkills.filter(id => id !== skillId)
          : [...selectedSkills, skillId];
        setSelectedSkills(updated);
      };

      const handleSave = () => {
        onUpdate(agentId, {
          mcpTools: selectedMcpTools,
          skills: selectedSkills
        });
      };

      return (
        <div className="tool-auth-panel">
          <h5 onClick={() => setExpanded(!expanded)} style={{ cursor: 'pointer' }}>
            <span>🛠️ 工具授权</span>
            <span>{expanded ? '▼' : '▶'}</span>
          </h5>

          {expanded && (
            <>
              {mcpTools.length > 0 && (
                <div className="tool-auth-section">
                  <div style={{ fontWeight: 500, marginBottom: 4 }}>MCP 工具</div>
                  {mcpTools.map(tool => (
                    <label key={`${tool.serverId}-${tool.name}`}>
                      <input
                        type="checkbox"
                        checked={selectedMcpTools.includes(`${tool.serverId}:${tool.name}`)}
                        onChange={() => handleToggleMcpTool(`${tool.serverId}:${tool.name}`)}
                      />
                      <span>{tool.name} <span style={{ color: '#999' }}>({tool.serverName})</span></span>
                    </label>
                  ))}
                </div>
              )}

              {skills.length > 0 && (
                <div className="tool-auth-section">
                  <div style={{ fontWeight: 500, marginBottom: 4 }}>Skills</div>
                  {skills.map(skill => (
                    <label key={skill.id}>
                      <input
                        type="checkbox"
                        checked={selectedSkills.includes(skill.id)}
                        onChange={() => handleToggleSkill(skill.id)}
                      />
                      <span>{skill.name}</span>
                    </label>
                  ))}
                </div>
              )}

              {mcpTools.length === 0 && skills.length === 0 && (
                <div style={{ color: '#999', fontSize: 10, padding: 4 }}>
                  暂无可授权的工具
                </div>
              )}

              <button
                onClick={handleSave}
                style={{ marginTop: 8, width: '100%', padding: 4, background: '#667eea', color: 'white', border: 'none', borderRadius: 4 }}
              >
                保存授权
              </button>
            </>
          )}
        </div>
      );
    }

    // 右侧工具栏组件
    function RightSidebar({
      mcpServers, onAddMcpServer, onDeleteMcpServer, onStartMcpServer, onStopMcpServer,
      skills, skillTemplates, onAddSkill, onDeleteSkill, onExecuteSkill,
      agents, skillAssignments, onUpdateSkillAssignment,
      currentAgent, mcpTools, agentToolsAuth, onUpdateAgentTools
    }) {
      const [activeTab, setActiveTab] = useState('skills'); // 默认显示 Skills

      return (
        <div className="right-sidebar">
          <div className="right-sidebar-tabs">
            <button
              className={`right-sidebar-tab ${activeTab === 'skills' ? 'active' : ''}`}
              onClick={() => setActiveTab('skills')}
            >
              ⚡ Skills
            </button>
            <button
              className={`right-sidebar-tab ${activeTab === 'mcp' ? 'active' : ''}`}
              onClick={() => setActiveTab('mcp')}
            >
              🔌 MCP
            </button>
            <button
              className={`right-sidebar-tab ${activeTab === 'auth' ? 'active' : ''}`}
              onClick={() => setActiveTab('auth')}
            >
              🔐 授权
            </button>
          </div>
          <div className="right-sidebar-content">
            {activeTab === 'skills' && (
              <SkillPanel
                skills={skills}
                templates={skillTemplates}
                agents={agents}
                skillAssignments={skillAssignments}
                onAdd={onAddSkill}
                onDelete={onDeleteSkill}
                onExecute={onExecuteSkill}
                onUpdateAssignment={onUpdateSkillAssignment}
              />
            )}
            {activeTab === 'mcp' && (
              <MCPPanel
                servers={mcpServers}
                onAdd={onAddMcpServer}
                onDelete={onDeleteMcpServer}
                onStart={onStartMcpServer}
                onStop={onStopMcpServer}
              />
            )}
            {activeTab === 'auth' && (
              currentAgent?.id ? (
                <ToolAuthorizationPanel
                  agentId={currentAgent.id}
                  mcpTools={mcpTools}
                  skills={skills}
                  currentAuth={agentToolsAuth[currentAgent.id]}
                  onUpdate={onUpdateAgentTools}
                />
              ) : (
                <div style={{ padding: 16, textAlign: 'center', color: '#666', fontSize: 12 }}>
                  请先选择一只猫咪
                </div>
              )
            )}
          </div>
        </div>
      );
    }

    // Steering 模式指示器 - 显示所有正在运行的猫咪
    function RunningAgentsIndicator({ runningAgents, agents, onStopAgent }) {
      const runningList = Object.entries(runningAgents);
      if (runningList.length === 0) return null;

      return (
        <div style={{
          background: '#f8f9fa',
          borderRadius: 8,
          padding: '8px 12px',
          marginBottom: 8,
          border: '1px solid #e9ecef'
        }}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: '#666' }}>
              运行中:
            </span>
            {runningList.map(([agentId, data]) => {
              const agentInfo = agents[agentId] || data.agent;
              return (
                <div key={agentId} style={{
                  background: '#fff',
                  borderRadius: 6,
                  padding: '4px 8px',
                  display: 'flex',
                  alignItems: 'center',
                  gap: 4,
                  fontSize: 12,
                  border: '1px solid #dee2e6'
                }}>
                  <span>{agentInfo?.avatar || '🐱'}</span>
                  <span>{agentInfo?.name || agentId}</span>
                  <span style={{ color: '#667eea' }}>
                    {data.agentStatus === 'thinking' ? '💭' :
                     data.agentStatus === 'streaming' ? '✍️' :
                     data.agentStatus === 'tool' ? '🔧' : '⏳'}
                  </span>
                  <button
                    onClick={() => onStopAgent(agentId)}
                    style={{
                      background: '#ff6b6b',
                      border: 'none',
                      borderRadius: 4,
                      padding: '2px 6px',
                      color: 'white',
                      cursor: 'pointer',
                      fontSize: 10
                    }}
                  >
                    停止
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // 主应用
    function App() {
      const [threads, setThreads] = useState([]);
      const [threadId, setThreadId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [agents, setAgents] = useState({});

      // Steering 模式：支持多猫咪同时运行
      const [runningAgents, setRunningAgents] = useState({}); // { agentId: { status, streamingContent, processLogs } }
      const [a2aMap, setA2aMap] = useState({}); // agentId -> callerId 映射

      // 保留用于兼容性
      const [loading, setLoading] = useState(false);
      const [streamingContent, setStreamingContent] = useState('');
      const [currentAgent, setCurrentAgent] = useState(null);
      const [currentCaller, setCurrentCaller] = useState(null);
      const [currentAgentStatus, setCurrentAgentStatus] = useState('thinking');
      const [currentProcessLogs, setCurrentProcessLogs] = useState([]);

      const [tokenUsage, setTokenUsage] = useState({ input: 0, output: 0, total: 0, cost: 0, budget: 100 });
      const [usageHistory, setUsageHistory] = useState([]);
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [renameThread, setRenameThread] = useState(null);
      const [autoSpeak, setAutoSpeak] = useState(false);
      const [vocabulary, setVocabulary] = useState({});
      const [agentMemory, setAgentMemory] = useState({});
      const [pendingTool, setPendingTool] = useState(null);
      const [showRolesModal, setShowRolesModal] = useState(false);
      const [threadRoles, setThreadRoles] = useState({}); // { agentId: roleDescription }

      // MCP 和 Skill 状态
      const [mcpServers, setMcpServers] = useState([]);
      const [skills, setSkills] = useState([]);
      const [skillTemplates, setSkillTemplates] = useState([]);
      const [mcpTools, setMcpTools] = useState([]);
      const [agentToolsAuth, setAgentToolsAuth] = useState({}); // { agentId: { mcpTools: [], skills: [] } }
      const [skillAssignments, setSkillAssignments] = useState({}); // { skillId: [agentId, ...] }

      const socketRef = useRef(null);
      const messagesEndRef = useRef(null);
      const threadIdRef = useRef(null);
      const processLogsRef = useRef([]);

      // 判断是否有任何猫咪正在运行
      const isAnyAgentRunning = Object.values(runningAgents).some(a => a.status === 'running');
      const runningAgentCount = Object.values(runningAgents).filter(a => a.status === 'running').length;

      useEffect(() => { threadIdRef.current = threadId; }, [threadId]);

      const loadThreads = async () => {
        try {
          const res = await fetch('/api/threads');
          const data = await res.json();
          setThreads(data);
          if (!threadIdRef.current && data.length > 0) setThreadId(data[0].id);
        } catch (err) { console.error('加载对话列表失败:', err); }
      };

      const loadAgents = async () => {
        try {
          const res = await fetch('/api/agents/status');
          setAgents(await res.json());
        } catch (err) { console.error('加载猫咪状态失败:', err); }
      };

      const loadTokenUsage = async () => {
        try {
          const res = await fetch('/api/token-usage');
          const data = await res.json();
          console.log('[前端] 初始 token 使用量:', data);
          setTokenUsage(data);
        } catch (err) { console.error('加载 token 使用量失败:', err); }
      };

      const loadVocabulary = async () => {
        try {
          const res = await fetch('/api/vocabulary');
          setVocabulary(await res.json());
        } catch (err) { console.error('加载词汇表失败:', err); }
      };

      // 加载 MCP 服务器
      const loadMcpServers = async () => {
        try {
          const res = await fetch('/api/mcp/servers');
          setMcpServers(await res.json());
        } catch (err) { console.error('加载 MCP 服务器失败:', err); }
      };

      // 加载 Skills
      const loadSkills = async () => {
        try {
          const res = await fetch('/api/skills');
          setSkills(await res.json());
        } catch (err) { console.error('加载 Skills 失败:', err); }
      };

      // 加载 Skill 模板
      const loadSkillTemplates = async () => {
        try {
          const res = await fetch('/api/skills/templates');
          setSkillTemplates(await res.json());
        } catch (err) { console.error('加载 Skill 模板失败:', err); }
      };

      // 加载所有 MCP 工具
      const loadMcpTools = async () => {
        try {
          const res = await fetch('/api/mcp/tools');
          setMcpTools(await res.json());
        } catch (err) { console.error('加载 MCP 工具失败:', err); }
      };

      // 加载 Skill 授权配置
      const loadSkillAssignments = async () => {
        try {
          const res = await fetch('/api/skills/assignments');
          const data = await res.json();
          // 转换为 { skillId: [agent objects] } 格式
          const assignments = {};
          for (const [skillId, agents] of Object.entries(data)) {
            assignments[skillId] = agents;
          }
          setSkillAssignments(assignments);
        } catch (err) { console.error('加载 Skill 授权配置失败:', err); }
      };

      useEffect(() => { loadThreads(); loadAgents(); loadVocabulary(); loadTokenUsage(); loadMcpServers(); loadSkills(); loadSkillTemplates(); loadMcpTools(); loadSkillAssignments(); }, []);

      useEffect(() => {
        socketRef.current = io();

        socketRef.current.on('connect', () => {
          console.log('WebSocket 已连接');
          if (threadIdRef.current) socketRef.current.emit('join', threadIdRef.current);
        });

        socketRef.current.on('message', (msg) => {
          if (msg.threadId === threadIdRef.current) setMessages(prev => [...prev, msg]);
          loadThreads();
        });

        socketRef.current.on('event', (event) => {
          console.log('事件:', event);
          const agentId = event.agent?.id || event.agentId;

          switch (event.type) {
            case 'start':
              console.log('[前端] start 事件:', event.agent?.name, agentId, 'caller:', event.caller?.name);
              // Steering 模式：更新特定猫咪的状态
              setRunningAgents(prev => {
                const isFirstAgent = Object.keys(prev).length === 0;
                if (isFirstAgent) {
                  // 第一只猫咪，清除全局日志
                  setCurrentProcessLogs([]);
                  processLogsRef.current = [];
                }
                return {
                  ...prev,
                  [agentId]: {
                    status: 'running',
                    agent: event.agent,
                    caller: event.caller || null,
                    agentStatus: 'thinking',
                    streamingContent: '',
                    processLogs: []
                  }
                };
              });
              // 更新全局状态（用于显示当前正在处理的猫咪）
              setCurrentAgent(event.agent);
              setCurrentCaller(event.caller || null);
              setCurrentAgentStatus('thinking');
              setStreamingContent('');
              setLoading(true);
              // 记录 A2A 映射
              if (event.isA2A && event.caller) {
                setA2aMap(prev => ({ ...prev, [agentId]: event.caller.id }));
              }
              // 立即更新 agents 状态
              setAgents(prev => ({
                ...prev,
                [agentId]: {
                  ...prev[agentId],
                  ...event.agent,
                  status: 'thinking',
                  statusMessage: '正在思考...'
                }
              }));
              break;
            case 'status':
              // Steering 模式：更新特定猫咪的状态
              setRunningAgents(prev => {
                if (prev[agentId]) {
                  return {
                    ...prev,
                    [agentId]: { ...prev[agentId], agentStatus: event.status }
                  };
                }
                return prev;
              });
              setCurrentAgentStatus(event.status);
              break;
            case 'stream':
              // Steering 模式：更新特定猫咪的流式内容
              setRunningAgents(prev => {
                if (prev[agentId]) {
                  return {
                    ...prev,
                    [agentId]: {
                      ...prev[agentId],
                      agentStatus: 'streaming',
                      streamingContent: (prev[agentId].streamingContent || '') + event.text
                    }
                  };
                }
                return prev;
              });
              setStreamingContent(prev => prev + event.text);
              setCurrentAgentStatus('streaming');
              break;
            case 'retry':
              setRunningAgents(prev => {
                if (prev[agentId]) {
                  return { ...prev, [agentId]: { ...prev[agentId], agentStatus: 'retry' } };
                }
                return prev;
              });
              setCurrentAgentStatus('retry');
              break;
            case 'complete':
              console.log('[前端] complete 事件:', agentId, 'response:', event.response?.slice(0, 50));
              // Steering 模式：从 runningAgents 移除该猫咪
              setRunningAgents(prev => {
                const updated = { ...prev };
                delete updated[agentId];
                return updated;
              });
              setMessages(prev => [...prev, {
                id: `msg-${Date.now()}`, threadId: threadIdRef.current,
                agentId: agentId, role: 'assistant',
                content: event.response, timestamp: Date.now(),
                isA2A: event.isA2A,
                processLogs: event.processLogs || processLogsRef.current
              }]);
              setStreamingContent('');
              setCurrentProcessLogs([]);
              processLogsRef.current = [];
              // 更新 agents 状态为 idle
              if (agentId) {
                setAgents(prev => ({
                  ...prev,
                  [agentId]: {
                    ...prev[agentId],
                    status: 'idle',
                    statusMessage: '等待召唤'
                  }
                }));
              }
              break;
            case 'done':
              console.log('[前端] 调用链完成:', event.callChain, 'isFinal:', event.isFinal);
              if (event.isFinal) {
                // Steering 模式：检查是否所有猫咪都完成了
                setRunningAgents(prev => {
                  if (Object.keys(prev).length === 0) {
                    setLoading(false);
                  }
                  return prev;
                });
                loadThreads();
                // 清空当前 agent
                setCurrentAgent(null);
                setCurrentCaller(null);
                // 重置所有参与调用的 agents 状态为 idle
                if (event.agentStats) {
                  setAgents(prev => {
                    const updated = { ...prev };
                    Object.keys(event.agentStats).forEach(id => {
                      if (updated[id]) {
                        updated[id] = {
                          ...updated[id],
                          status: 'idle',
                          statusMessage: '等待召唤'
                        };
                      }
                    });
                    return updated;
                  });
                }
              }
              break;
            case 'depth-limit':
              console.warn('[前端] 达到深度限制:', event.maxDepth);
              setMessages(prev => [...prev, {
                id: `depth-${Date.now()}`, threadId: threadIdRef.current,
                agentId: 'system', role: 'assistant',
                content: `⚠️ A2A 调用达到最大深度 ${event.maxDepth}，已停止进一步调用`,
                timestamp: Date.now()
              }]);
              break;
            case 'pending_confirmation':
              console.log('[前端] 待确认操作:', event);
              setPendingTool({
                name: event.tool,
                description: event.description,
                input: event.input,
                agentId: event.agentId
              });
              setMessages(prev => [...prev, {
                id: `pending-${Date.now()}`, threadId: threadIdRef.current,
                agentId: event.agentId, role: 'assistant',
                content: `⏳ 需要确认: ${event.description || event.tool}\n\n请回复"确认"继续执行，或回复"取消"放弃操作。`,
                timestamp: Date.now()
              }]);
              break;
            case 'tool_result':
              console.log('[前端] 工具结果:', event.name);
              // 可以在这里添加工具结果的显示
              break;
            case 'tool_error':
              console.log('[前端] 工具错误:', event.name, event.error);
              // 工具错误不计入最终消息，只记录日志
              break;
            case 'error':
              console.error('错误:', event.message);
              setLoading(false);
              setCurrentAgent(null);
              setCurrentCaller(null);
              setCurrentProcessLogs([]);
              processLogsRef.current = [];
              setMessages(prev => [...prev, {
                id: `error-${Date.now()}`, threadId: threadIdRef.current,
                agentId: 'system', role: 'assistant',
                content: `❌ 错误: ${event.message}`, timestamp: Date.now()
              }]);
              break;
          }
        });

        // 监听私有状态事件（thinking, tool, status）- 实时显示思考过程
        socketRef.current.on('status-event', (event) => {
          console.log('[前端] 收到状态事件:', event.type, 'agentId:', event.agentId, JSON.stringify(event).slice(0, 200));
          const agentId = event.agentId;
          const logEntry = {
            type: event.type,
            time: Date.now(),
            ...(event.type === 'thinking' && { text: event.text }),
            ...(event.type === 'tool' && { name: event.name, input: event.input }),
            ...(event.type === 'status' && { status: event.status, message: event.message })
          };

          // Steering 模式：更新特定猫咪的 processLogs
          if (agentId) {
            setRunningAgents(prev => {
              if (prev[agentId]) {
                const existingLogs = prev[agentId].processLogs || [];
                return {
                  ...prev,
                  [agentId]: {
                    ...prev[agentId],
                    processLogs: [...existingLogs, logEntry]
                  }
                };
              }
              return prev;
            });
          }

          // 同时更新全局日志（兼容性）
          processLogsRef.current = [...processLogsRef.current, logEntry];
          setCurrentProcessLogs([...processLogsRef.current]);
        });

        socketRef.current.on('agents-status', (status) => {
          setAgents(status);
          // 根据状态恢复 runningAgents（刷新页面后）
          const running = {};
          Object.entries(status).forEach(([agentId, agent]) => {
            if (agent.status && agent.status !== 'idle') {
              running[agentId] = {
                status: 'running',
                agent: { id: agentId, name: agent.name, avatar: agent.avatar },
                agentStatus: agent.status,
                streamingContent: '',
                processLogs: []
              };
            }
          });
          if (Object.keys(running).length > 0) {
            console.log('[前端] 恢复 runningAgents:', running);
            setRunningAgents(running);
          }
        });

        socketRef.current.on('agent-status-update', ({ agentId, status, message }) => {
          console.log('[前端] 收到状态更新:', agentId, status, message);
          setAgents(prev => {
            const updated = {
              ...prev,
              [agentId]: { ...prev[agentId], status, statusMessage: message }
            };
            console.log('[前端] 更新后的 agents:', Object.keys(updated), updated[agentId]);
            return updated;
          });
        });

        socketRef.current.on('token-usage', (usage) => {
          console.log('[前端] 收到 token-usage:', usage);
          setTokenUsage(usage);

          // 更新每分钟使用历史
          const now = new Date();
          const minuteKey = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes()).getTime();

          setUsageHistory(prev => {
            const lastEntry = prev[prev.length - 1];
            if (lastEntry && lastEntry.minute === minuteKey) {
              // 更新当前分钟
              return [...prev.slice(0, -1), { minute: minuteKey, tokens: usage.total }];
            } else {
              // 添加新分钟
              return [...prev, { minute: minuteKey, tokens: usage.total }].slice(-20); // 保留最近20分钟
            }
          });
        });

        return () => { socketRef.current?.disconnect(); };
      }, []);

      useEffect(() => {
        if (threadId && socketRef.current) {
          console.log('[前端] 加入房间:', threadId);
          socketRef.current.emit('join', threadId);
          fetch(`/api/threads/${threadId}/messages`)
            .then(res => res.json())
            .then(data => setMessages(data))
            .catch(err => console.error('加载消息失败:', err));
          // 加载待确认工具
          loadPendingTool(threadId);
          // 加载角色配置
          fetch(`/api/threads/${threadId}/roles`)
            .then(res => res.json())
            .then(data => setThreadRoles(data || {}))
            .catch(err => console.error('加载角色配置失败:', err));
        }
      }, [threadId]);

      // 当 currentAgent 变化时加载长期记忆
      useEffect(() => {
        if (currentAgent?.id) {
          loadAgentMemory(currentAgent.id);
        }
      }, [currentAgent?.id]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, streamingContent]);

      const handleSend = async (text) => {
        // Steering 模式：检查是否有选中的猫咪（通过复选框）
        const selectedAgentIds = Object.keys(agents).filter(id => agents[id].selected);

        let targetAgents = null;

        if (selectedAgentIds.length > 0) {
          // 如果有复选框选中的猫咪，过滤掉已经在运行的
          const availableAgentIds = selectedAgentIds.filter(id => !runningAgents[id]);
          if (availableAgentIds.length === 0) {
            console.log('所有选中的猫咪都在运行中');
            return;
          }
          targetAgents = availableAgentIds;
        }
        // 如果没有复选框选中，targetAgents 保持 null，让后端解析 @mentions

        try {
          await fetch(`/api/threads/${threadId}/invoke`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, agents: targetAgents })
          });
        } catch (err) {
          console.error('发送失败:', err);
        }
      };

      // Steering 模式：切换猫咪选择
      const toggleAgentSelection = (agentId) => {
        setAgents(prev => ({
          ...prev,
          [agentId]: {
            ...prev[agentId],
            selected: !prev[agentId]?.selected
          }
        }));
      };

      // Steering 模式：停止单只猫咪
      const handleStopAgent = async (agentId) => {
        // 从 runningAgents 中移除
        setRunningAgents(prev => {
          const updated = { ...prev };
          delete updated[agentId];
          // 如果没有猫咪在运行了，设置 loading 为 false
          if (Object.keys(updated).length === 0) {
            setLoading(false);
          }
          return updated;
        });
        // 更新 agent 状态
        setAgents(prev => ({
          ...prev,
          [agentId]: {
            ...prev[agentId],
            status: 'idle',
            statusMessage: '已停止'
          }
        }));
        // 发送停止请求
        await fetch(`/api/threads/${threadId}/stop`, { method: 'POST' });
      };

      const handleStop = async () => {
        // 停止所有运行中的猫咪
        const runningIds = Object.keys(runningAgents);
        for (const agentId of runningIds) {
          await fetch(`/api/threads/${threadId}/stop`, { method: 'POST' });
        }
        setRunningAgents({});
        setLoading(false);
        setStreamingContent('');
        setCurrentAgent(null);
        // 重置所有 agent 状态
        setAgents(prev => {
          const updated = { ...prev };
          runningIds.forEach(id => {
            if (updated[id]) {
              updated[id] = { ...updated[id], status: 'idle', statusMessage: '已停止' };
            }
          });
          return updated;
        });
      };

      const handleCreateThread = async (title) => {
        const res = await fetch('/api/threads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        const data = await res.json();
        setThreadId(data.threadId);
        setMessages([]);
        setShowCreateModal(false);
        loadThreads();
      };

      const handleDeleteThread = async (id) => {
        if (!confirm('确定要删除这个对话吗？')) return;
        await fetch(`/api/threads/${id}`, { method: 'DELETE' });
        loadThreads();
        if (id === threadId) { setThreadId(null); setMessages([]); }
      };

      const handleArchiveThread = async (id, archived) => {
        await fetch(`/api/threads/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ archived })
        });
        loadThreads();
        if (archived && id === threadId) { setThreadId(null); setMessages([]); }
      };

      const handleRenameThread = async (id, title) => {
        await fetch(`/api/threads/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        loadThreads();
      };

      const handleRegisterAgent = async (data) => {
        try {
          await fetch('/api/agents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          loadAgents();
        } catch (err) { console.error('注册猫咪失败:', err); }
      };

      const handleDeleteAgent = async (id) => {
        if (!confirm('确定要删除这只猫咪吗？')) return;
        try {
          const res = await fetch(`/api/agents/${id}`, { method: 'DELETE' });
          if (res.ok) {
            // 从本地状态立即移除
            setAgents(prev => {
              const updated = { ...prev };
              delete updated[id];
              return updated;
            });
          } else {
            const data = await res.json().catch(() => ({}));
            alert(`删除失败: ${data.error || res.statusText}`);
          }
          // 无论如何都刷新一下
          loadAgents();
        } catch (err) {
          console.error('删除猫咪失败:', err);
          alert('删除猫咪失败: ' + err.message);
        }
      };

      const handleAddVocab = async (word, pronunciation) => {
        try {
          await fetch('/api/vocabulary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word, pronunciation })
          });
          loadVocabulary();
        } catch (err) { console.error('添加词汇失败:', err); }
      };

      const handleDeleteVocab = async (word) => {
        try {
          await fetch(`/api/vocabulary/${encodeURIComponent(word)}`, { method: 'DELETE' });
          loadVocabulary();
        } catch (err) { console.error('删除词汇失败:', err); }
      };

      // 加载当前猫咪的长期记忆
      const loadAgentMemory = async (agentId) => {
        if (!agentId) return;
        try {
          const res = await fetch(`/api/agents/${agentId}/memory`);
          setAgentMemory(await res.json());
        } catch (err) { console.error('加载记忆失败:', err); }
      };

      // 添加长期记忆
      const handleAddMemory = async (key, value) => {
        const agentId = currentAgent?.id || 'opus';
        try {
          await fetch(`/api/agents/${agentId}/memory`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, value })
          });
          loadAgentMemory(agentId);
        } catch (err) { console.error('添加记忆失败:', err); }
      };

      // 删除长期记忆
      const handleDeleteMemory = async (key) => {
        const agentId = currentAgent?.id || 'opus';
        try {
          await fetch(`/api/agents/${agentId}/memory/${encodeURIComponent(key)}`, { method: 'DELETE' });
          loadAgentMemory(agentId);
        } catch (err) { console.error('删除记忆失败:', err); }
      };

      // 加载待确认工具
      const loadPendingTool = async (tid) => {
        if (!tid) return;
        try {
          const res = await fetch(`/api/threads/${tid}/pending-tool`);
          const data = await res.json();
          setPendingTool(Object.keys(data).length > 0 ? data : null);
        } catch (err) { console.error('加载待确认工具失败:', err); }
      };

      // 清除待确认工具
      const handleClearPendingTool = async () => {
        try {
          await fetch(`/api/threads/${threadId}/pending-tool`, { method: 'DELETE' });
          setPendingTool(null);
        } catch (err) { console.error('清除待确认工具失败:', err); }
      };

      // 确认执行待确认工具（发送确认消息）
      const handleConfirmPendingTool = async () => {
        if (!pendingTool) return;
        try {
          // 发送确认消息
          await fetch(`/api/threads/${threadId}/invoke`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              message: '确认执行',
              agents: [pendingTool.agentId]
            })
          });
          setPendingTool(null);
        } catch (err) { console.error('确认执行失败:', err); }
      };

      // 清除会话状态
      const handleClearSession = async (tid) => {
        if (!confirm('确定要清除会话状态吗？这将清除待确认的操作。')) return;
        try {
          await fetch(`/api/threads/${tid}/session`, { method: 'DELETE' });
          setPendingTool(null);
        } catch (err) { console.error('清除会话失败:', err); }
      };

      // MCP 服务器操作
      const handleAddMcpServer = async (config) => {
        try {
          await fetch('/api/mcp/servers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
          });
          loadMcpServers();
        } catch (err) { console.error('添加 MCP 服务器失败:', err); }
      };

      const handleDeleteMcpServer = async (serverId) => {
        if (!confirm('确定要删除这个 MCP 服务器吗？')) return;
        try {
          await fetch(`/api/mcp/servers/${serverId}`, { method: 'DELETE' });
          loadMcpServers();
          loadMcpTools();
        } catch (err) { console.error('删除 MCP 服务器失败:', err); }
      };

      const handleStartMcpServer = async (serverId) => {
        try {
          await fetch(`/api/mcp/servers/${serverId}/start`, { method: 'POST' });
          loadMcpServers();
          setTimeout(() => { loadMcpTools(); }, 1000); // 稍后刷新工具列表
        } catch (err) { console.error('启动 MCP 服务器失败:', err); }
      };

      const handleStopMcpServer = async (serverId) => {
        try {
          await fetch(`/api/mcp/servers/${serverId}/stop`, { method: 'POST' });
          loadMcpServers();
          loadMcpTools();
        } catch (err) { console.error('停止 MCP 服务器失败:', err); }
      };

      // Skill 操作
      const handleAddSkill = async (config) => {
        try {
          const endpoint = config.templateId ? '/api/skills/from-template' : '/api/skills';
          await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
          });
          loadSkills();
        } catch (err) { console.error('添加 Skill 失败:', err); }
      };

      const handleDeleteSkill = async (skillId) => {
        if (!confirm('确定要删除这个 Skill 吗？')) return;
        try {
          await fetch(`/api/skills/${skillId}`, { method: 'DELETE' });
          loadSkills();
        } catch (err) { console.error('删除 Skill 失败:', err); }
      };

      const handleExecuteSkill = async (skillId) => {
        try {
          const res = await fetch(`/api/skills/${skillId}/execute`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ params: {} })
          });
          const result = await res.json();
          console.log('Skill 执行结果:', result);
          alert(`执行结果: ${JSON.stringify(result, null, 2)}`);
        } catch (err) { console.error('执行 Skill 失败:', err); }
      };

      // 工具授权操作
      const handleUpdateAgentTools = async (agentId, tools) => {
        try {
          await fetch(`/api/agents/${agentId}/tools`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(tools)
          });
          setAgentToolsAuth(prev => ({ ...prev, [agentId]: tools }));
        } catch (err) { console.error('更新工具授权失败:', err); }
      };

      // Skill 授权操作（按 Skill 维度）
      const handleUpdateSkillAssignment = async (skillId, agentIds) => {
        try {
          await fetch(`/api/skills/${skillId}/agents`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agentIds })
          });
          // 更新本地状态
          loadSkillAssignments();
        } catch (err) { console.error('更新 Skill 授权失败:', err); }
      };

      const loadAgentToolsAuth = async (agentId) => {
        try {
          const res = await fetch(`/api/agents/${agentId}/tools`);
          const data = await res.json();
          setAgentToolsAuth(prev => ({ ...prev, [agentId]: data }));
          return data;
        } catch (err) {
          console.error('加载工具授权失败:', err);
          return { mcpTools: [], skills: [] };
        }
      };

      const currentThread = threads.find(t => t.id === threadId);

      return (
        <>
          <div className="sidebar">
            <div className="sidebar-header">
              <h1>Cat Café Mini</h1>
              <p>与可爱的猫咪们聊天吧</p>
            </div>

            <div className="sidebar-content">
              <TokenPanel usage={tokenUsage} usageHistory={usageHistory} />

              <button className="new-thread-btn" onClick={() => setShowCreateModal(true)}>
                + 新建对话
              </button>

              <ThreadList threads={threads} activeThreadId={threadId}
                onSelect={setThreadId} onDelete={handleDeleteThread}
                onArchive={handleArchiveThread} onRename={setRenameThread} />

              <AgentPanel
                agents={agents}
                onDelete={handleDeleteAgent}
                onAdd={handleRegisterAgent}
                runningAgents={runningAgents}
                onToggleSelection={toggleAgentSelection}
                onStopAgent={handleStopAgent}
              />

              <VoiceSettingsPanel autoSpeak={autoSpeak} setAutoSpeak={setAutoSpeak} />

              <VocabularyPanel
                vocabulary={vocabulary}
                onAdd={handleAddVocab}
                onDelete={handleDeleteVocab}
              />

              <MemoryPanel
                agentId={currentAgent?.id || 'opus'}
                memory={agentMemory}
                onAdd={handleAddMemory}
                onDelete={handleDeleteMemory}
              />

              <SessionControls threadId={threadId} onClear={handleClearSession} />
            </div>
          </div>

          <div className="chat-area">
            {threadId ? (
              <>
                <div className="chat-header">
                  <div>
                    <h2>{currentThread?.title || '新对话'}</h2>
                    {Object.keys(threadRoles).length > 0 && (
                      <div style={{ fontSize: 12, color: '#666', marginTop: 4 }}>
                        {Object.entries(threadRoles).map(([agentId, role]) => {
                          const agent = agents[agentId];
                          return agent ? `${agent.name}: ${role}` : null;
                        }).filter(Boolean).join(' | ')}
                      </div>
                    )}
                  </div>
                  <button
                    className="roles-config-btn"
                    onClick={() => setShowRolesModal(true)}
                    title="配置对话角色"
                  >
                    🎭
                  </button>
                </div>

                <PendingToolBanner
                  pendingTool={pendingTool}
                  onConfirm={handleConfirmPendingTool}
                  onClear={handleClearPendingTool}
                />

                <div className="messages-container">
                  {messages.map(msg => (
                    <MessageBubble
                      key={msg.id}
                      message={msg}
                      agentInfo={agents[msg.agentId]}
                      callerInfo={msg.isA2A ? agents[a2aMap[msg.agentId]] : null}
                      vocabulary={vocabulary}
                      autoSpeak={autoSpeak}
                    />
                  ))}
                  {streamingContent && (
                    <MessageBubble
                      message={{
                        role: 'assistant',
                        agentId: currentAgent?.id || 'opus',
                        content: streamingContent,
                        processLogs: currentProcessLogs  // 传递实时日志
                      }}
                      agentInfo={agents[currentAgent?.id] || agents['opus']}
                      callerInfo={currentCaller}
                      isStreaming={true}
                      vocabulary={vocabulary}
                      autoSpeak={false}
                    />
                  )}
                  {/* Steering 模式：显示所有运行中猫咪的状态 */}
                  {Object.entries(runningAgents).map(([agentId, data]) => {
                    const agentInfo = agents[agentId] || data.agent;
                    return (
                      <div key={agentId} className="message-bubble steering-agent" data-agent={agentId}>
                        <div className="message-avatar">{agentInfo?.avatar || '🐱'}</div>
                        <div className="message-content">
                          <div className="message-sender-wrapper">
                            <div className="message-sender">{agentInfo?.name || agentId}</div>
                            {data.caller && (
                              <span className="a2a-indicator">
                                <span className="arrow">←</span>
                                {data.caller.avatar} {data.caller.name} 呼叫
                              </span>
                            )}
                          </div>
                          <div style={{ padding: '8px 0', color: '#666', fontSize: 13 }}>
                            {data.agentStatus === 'thinking' ? '💭 正在思考...' :
                             data.agentStatus === 'tool' ? '🔧 使用工具中...' :
                             data.agentStatus === 'streaming' ? '✍️ 正在回复...' :
                             data.agentStatus === 'retry' ? '⏳ 重试中...' : '⏳ 处理中...'}
                            {data.processLogs && data.processLogs.length > 0 && (
                              <span style={{ marginLeft: 8, color: '#667eea' }}>
                                ({data.processLogs.length} 条思考记录)
                              </span>
                            )}
                          </div>
                          {data.processLogs && data.processLogs.length > 0 && (
                            <ProcessLogPanel logs={data.processLogs} isLive={true} />
                          )}
                        </div>
                      </div>
                    );
                  })}
                  {/* 兼容旧模式：如果没有 runningAgents 但有 currentAgent */}
                  {loading && !streamingContent && currentAgent && Object.keys(runningAgents).length === 0 && (
                    <div className="message-bubble">
                      <div className="message-avatar">{currentAgent?.avatar || '🐱'}</div>
                      <div className="message-content">
                        <div className="message-sender-wrapper">
                          <div className="message-sender">{currentAgent?.name}</div>
                          {currentCaller && (
                            <span className="a2a-indicator">
                              <span className="arrow">←</span>
                              {currentCaller.avatar} {currentCaller.name} 呼叫
                            </span>
                          )}
                        </div>
                        <div style={{ padding: '8px 0', color: '#666', fontSize: 13 }}>
                          {currentAgentStatus === 'thinking' ? '💭 正在思考...' :
                           currentAgentStatus === 'tool' ? '🔧 使用工具中...' :
                           currentAgentStatus === 'retry' ? '⏳ 重试中...' : '⏳ 处理中...'}
                          {currentProcessLogs.length > 0 && (
                            <span style={{ marginLeft: 8, color: '#667eea' }}>
                              ({currentProcessLogs.length} 条思考记录)
                            </span>
                          )}
                        </div>
                        <ProcessLogPanel logs={currentProcessLogs} isLive={true} />
                      </div>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </div>

                <RunningAgentsIndicator
                  runningAgents={runningAgents}
                  agents={agents}
                  onStopAgent={handleStop}
                />

                <div className="input-area">
                  <InputBox onSend={handleSend} disabled={false} onStop={handleStop} showStop={isAnyAgentRunning} agents={agents} />
                </div>
              </>
            ) : (
              <div style={{
                flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: 'white', fontSize: 18
              }}>选择或创建一个对话开始聊天</div>
            )}
          </div>

          {/* 右侧工具栏 */}
          <RightSidebar
            mcpServers={mcpServers}
            onAddMcpServer={handleAddMcpServer}
            onDeleteMcpServer={handleDeleteMcpServer}
            onStartMcpServer={handleStartMcpServer}
            onStopMcpServer={handleStopMcpServer}
            skills={skills}
            skillTemplates={skillTemplates}
            onAddSkill={handleAddSkill}
            onDeleteSkill={handleDeleteSkill}
            onExecuteSkill={handleExecuteSkill}
            agents={agents}
            skillAssignments={skillAssignments}
            onUpdateSkillAssignment={handleUpdateSkillAssignment}
            currentAgent={currentAgent}
            mcpTools={mcpTools}
            agentToolsAuth={agentToolsAuth}
            onUpdateAgentTools={handleUpdateAgentTools}
          />

          {showCreateModal && (
            <CreateThreadModal onClose={() => setShowCreateModal(false)} onCreate={handleCreateThread} />
          )}

          {renameThread && (
            <RenameThreadModal
              thread={renameThread}
              onClose={() => setRenameThread(null)}
              onRename={handleRenameThread}
            />
          )}

          {showRolesModal && (
            <RolesConfigModal
              threadId={threadId}
              roles={threadRoles}
              agents={agents}
              onClose={() => setShowRolesModal(false)}
              onSave={(roles) => setThreadRoles(roles)}
            />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
