<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Café Mini</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/socket.io-client@4/dist/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    #root { display: flex; height: 100vh; }

    /* 侧边栏 */
    .sidebar {
      width: 280px;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(0, 0, 0, 0.1);
      height: 100vh;
      overflow: hidden;
    }

    /* 右侧工具栏 */
    .right-sidebar {
      width: 300px;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(0, 0, 0, 0.1);
      height: 100vh;
      overflow: hidden;
    }

    .right-sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #f8f9fa;
    }

    .right-sidebar-header h3 {
      font-size: 14px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .right-sidebar-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
    }

    .sidebar-content, .right-sidebar-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }

    .sidebar-header h1 { font-size: 20px; color: #333; }
    .sidebar-header p { font-size: 12px; color: #666; margin-top: 4px; }

    /* Token 使用量面板 */
    .token-panel {
      padding: 12px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
    }

    .token-panel h4 {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .token-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }

    .token-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }

    .token-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s;
    }

    .token-bar-fill.warning { background: #f39c12; }
    .token-bar-fill.danger { background: #e74c3c; }

    .token-cost {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }

    /* 对话列表 */
    .thread-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .thread-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .thread-item:hover { background: #f5f5f5; }
    .thread-item.active { background: #667eea; color: white; }

    .thread-item .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .thread-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }

    .thread-item:hover .delete-btn { opacity: 0.6; }
    .thread-item.active .delete-btn { color: white; }

    /* 线程操作按钮 */
    .thread-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .thread-item:hover .thread-actions { opacity: 1; }

    .thread-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      color: inherit;
      opacity: 0.6;
    }

    .thread-action-btn:hover { opacity: 1; }
    .thread-item.active .thread-action-btn { color: white; }

    /* 已归档线程区域 */
    .archived-section {
      border-top: 1px solid #eee;
      padding: 8px;
      margin-top: 8px;
    }

    .archived-header {
      font-size: 12px;
      color: #999;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .archived-header:hover { color: #667eea; }

    .archived-list {
      max-height: 150px;
      overflow-y: auto;
    }

    .thread-item.archived {
      opacity: 0.6;
      font-size: 12px;
      padding: 8px;
    }

    .thread-item.archived .title {
      text-decoration: line-through;
    }

    .thread-time {
      font-size: 10px;
      color: #999;
      margin-left: 4px;
    }

    .new-thread-btn {
      margin: 8px;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .new-thread-btn:hover { background: #5a6fd6; }

    /* 猫咪面板 */
    .agent-panel {
      border-top: 1px solid #eee;
      padding: 12px;
    }

    .agent-panel h3 { font-size: 14px; color: #333; margin-bottom: 8px; }

    .agent-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .agent-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      background: #fafafa;
      transition: all 0.2s;
    }

    .agent-item.active {
      background: #f0f4ff;
      border-left: 3px solid #667eea;
    }

    .agent-item.selected {
      background: #e8f5e9;
      border-left: 3px solid #4caf50;
    }

    .agent-item.selected.active {
      background: #fff3e0;
      border-left: 3px solid #ff9800;
    }

    .agent-item .avatar {
      margin-right: 10px;
      font-size: 24px;
    }

    .agent-item .info { flex: 1; }

    .agent-item .name {
      font-weight: 500;
      color: #333;
    }

    .agent-item .status {
      font-size: 11px;
      margin-top: 2px;
    }

    .agent-item .status.idle { color: #27ae60; }
    .agent-item .status.thinking { color: #3498db; }
    .agent-item .status.tool { color: #9b59b6; }
    .agent-item .status.streaming { color: #2ecc71; }
    .agent-item .status.retry { color: #e67e22; }

    .agent-item .status-icon {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 1s infinite;
    }

    .agent-item .status-icon.idle {
      background: #27ae60;
      animation: none;
    }

    .agent-item .status-icon.thinking { background: #3498db; }
    .agent-item .status-icon.tool { background: #9b59b6; }
    .agent-item .status-icon.streaming { background: #2ecc71; }
    .agent-item .status-icon.retry { background: #e67e22; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .agent-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      color: #999;
      opacity: 0.5;
    }

    .agent-item:hover .delete-btn { opacity: 1; color: #e74c3c; }

    .add-agent-btn {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: #f5f5f5;
      border: 1px dashed #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
    }

    .add-agent-btn:hover { background: #eee; }

    /* 聊天区域 */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .chat-header {
      background: white;
      border-radius: 16px;
      padding: 16px 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header h2 { font-size: 18px; color: #333; margin: 0; }

    .roles-config-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .roles-config-btn:hover {
      background: #f0f0f0;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Steering 模式下多猫咪思考面板 - 简洁样式 */
    .message-bubble.steering-agent {
      margin: 12px 0;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .steering-agent .message-sender {
      font-weight: 600;
    }

    .steering-agent .message-content {
      border-left: 4px solid #667eea;
      background: #f8f9ff;
      border-radius: 0 12px 12px 0;
    }

    /* 不同猫咪用不同颜色左边框 */
    .message-bubble.steering-agent[data-agent="opus"] .message-content {
      border-left-color: #667eea;
      background: #f8f9ff;
    }
    .message-bubble.steering-agent[data-agent="opus"] .message-sender {
      color: #667eea;
    }

    .message-bubble.steering-agent[data-agent="cat-1772106648622-b890a518"] .message-content {
      border-left-color: #f59e0b;
      background: #fff8e1;
    }
    .message-bubble.steering-agent[data-agent="cat-1772106648622-b890a518"] .message-sender {
      color: #f59e0b;
    }

    .message-bubble.steering-agent[data-agent="cat-1772181082591-000c0074"] .message-content {
      border-left-color: #27ae60;
      background: #e8f5e9;
    }
    .message-bubble.steering-agent[data-agent="cat-1772181082591-000c0074"] .message-sender {
      color: #27ae60;
    }

    .message-bubble.steering-agent[data-agent="cat-1772208109895-e2121e1b"] .message-content {
      border-left-color: #e91e63;
      background: #fce4ec;
    }
    .message-bubble.steering-agent[data-agent="cat-1772208109895-e2121e1b"] .message-sender {
      color: #e91e63;
    }

    .message-bubble {
      display: flex;
      margin-bottom: 16px;
      align-items: flex-start;
    }

    .message-bubble.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin: 0 12px;
    }

    .message-bubble.user .message-avatar { background: #667eea; }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      background: #f0f0f0;
    }

    .message-bubble.user .message-content {
      background: #667eea;
      color: white;
    }

    .message-sender {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .message-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .input-area { position: relative; }

    .input-form {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .input-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
    }

    .input-form button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      cursor: pointer;
    }

    .input-form button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .stop-btn {
      padding: 10px 20px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #f0f0f0;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .loading-indicator .retry-text {
      color: #e67e22;
      font-style: italic;
    }

    /* A2A 指示器 */
    .a2a-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #666;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }

    .a2a-indicator .arrow {
      color: #667eea;
    }

    .message-sender-wrapper {
      display: flex;
      align-items: center;
    }

    .message-text .mention {
      color: #667eea;
      font-weight: 500;
      background: #f0f4ff;
      padding: 0 4px;
      border-radius: 4px;
    }

    /* 过程日志面板 */
    .process-logs-toggle {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .process-logs-toggle:hover {
      color: #667eea;
    }

    .process-logs-panel {
      margin-top: 8px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      border-left: 3px solid #667eea;
    }

    .process-logs-panel.live {
      background: #f0f4ff;
      border-left: 3px solid #667eea;
      animation: pulse-border 1.5s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-left-color: #667eea; }
      50% { border-left-color: #a5b4fc; }
    }

    .process-log-item {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .process-log-item:last-child {
      border-bottom: none;
    }

    .process-log-item .log-type {
      font-weight: 500;
      color: #667eea;
      margin-right: 8px;
    }

    .process-log-item .log-type.tool {
      color: #9b59b6;
    }

    .process-log-item .log-type.thinking {
      color: #3498db;
    }

    .process-log-item .log-type.status {
      color: #27ae60;
    }

    .process-log-item .log-content {
      color: #555;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .process-log-item .log-time {
      color: #aaa;
      font-size: 10px;
      margin-left: 8px;
    }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 400px;
      max-width: 90%;
    }

    .modal h3 { margin-bottom: 16px; font-size: 18px; }

    .modal label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #666;
    }

    .modal input,
    .modal textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .modal textarea { height: 100px; resize: vertical; }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .modal-buttons .cancel-btn { background: #f5f5f5; }
    .modal-buttons .confirm-btn { background: #667eea; color: white; }

    /* 语音按钮样式 */
    .voice-btn {
      background: #667eea;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      transition: all 0.2s;
    }

    .voice-btn:hover { background: #5a6fd6; }

    .voice-btn.recording {
      background: #e74c3c;
      animation: pulse-scale 1s infinite;
    }

    @keyframes pulse-scale {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
    }

    .voice-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* 消息朗读按钮 */
    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .speak-btn:hover { opacity: 1; }
    .speak-btn.speaking { color: #667eea; opacity: 1; }

    /* 语音设置面板 */
    .voice-settings {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-top: 8px;
      font-size: 11px;
      border-top: 1px solid #eee;
    }

    .voice-settings label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .voice-toggle {
      position: relative;
      width: 32px;
      height: 18px;
      background: #ccc;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .voice-toggle.active { background: #667eea; }

    .voice-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .voice-toggle.active::after { transform: translateX(14px); }

    /* 词汇表面板 */
    .vocab-panel {
      margin-top: 8px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      border-top: 1px solid #eee;
    }

    .vocab-panel h4 {
      margin-bottom: 6px;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 2px 0;
    }

    .vocab-panel h4:hover { color: #667eea; }

    .vocab-list {
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 6px;
    }

    .vocab-list:empty { display: none; }

    .vocab-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 6px;
      background: white;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 11px;
    }

    .vocab-item .word { font-weight: 500; }
    .vocab-item .pronunciation { color: #666; }
    .vocab-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      padding: 0 4px;
    }

    .vocab-item .delete-btn:hover { color: #e74c3c; }

    .vocab-add-form {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .vocab-add-form input {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      min-width: 0;
    }

    .vocab-add-form button {
      padding: 3px 8px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    /* 浏览器兼容性提示 */
    .browser-warning {
      padding: 8px 12px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 12px;
      color: #856404;
      margin: 8px 0;
    }

    /* 记忆管理面板 */
    .memory-panel {
      margin-top: 8px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      border-top: 1px solid #eee;
    }

    .memory-panel h4 {
      margin-bottom: 6px;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 2px 0;
    }

    .memory-panel h4:hover { color: #667eea; }

    .memory-list {
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 6px;
    }

    .memory-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 6px;
      background: white;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 11px;
    }

    .memory-item .key { font-weight: 500; color: #667eea; }
    .memory-item .value { color: #666; flex: 1; margin-left: 8px; }
    .memory-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 状态图标映射
    const STATUS_ICONS = {
      idle: '💤',
      thinking: '🧠',
      tool: '🔧',
      streaming: '💬',
      retry: '🔄'
    };

    // 弹窗组件
    function Modal({ title, children, onClose }) {
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{title}</h3>
            {children}
          </div>
        </div>
      );
    }

    // 新建对话弹窗
    function CreateThreadModal({ onClose, onCreate }) {
      const [title, setTitle] = useState('');

      return (
        <Modal title="新建对话" onClose={onClose}>
          <label>对话名称</label>
          <input
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="输入对话名称（可选）"
            autoFocus
            onKeyDown={e => { if (e.key === 'Enter') onCreate(title.trim() || '新对话'); }}
          />
          <div className="modal-buttons">
            <button className="cancel-btn" onClick={onClose}>取消</button>
            <button className="confirm-btn" onClick={() => onCreate(title.trim() || '新对话')}>创建</button>
          </div>
        </Modal>
      );
    }

    // 重命名对话弹窗
    function RenameThreadModal({ thread, onClose, onRename }) {
      const [title, setTitle] = useState(thread?.title || '');

      return (
        <Modal title="重命名对话" onClose={onClose}>
          <label>对话名称</label>
          <input
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="输入新名称"
            autoFocus
            onKeyDown={e => { if (e.key === 'Enter' && title.trim()) { onRename(thread.id, title.trim()); onClose(); } }}
          />
          <div className="modal-buttons">
            <button className="cancel-btn" onClick={onClose}>取消</button>
            <button className="confirm-btn" onClick={() => { if (title.trim()) { onRename(thread.id, title.trim()); onClose(); } }}>保存</button>
          </div>
        </Modal>
      );
    }

    // 注册猫咪弹窗
    function RegisterAgentModal({ onClose, onRegister }) {
      const [name, setName] = useState('');
      const [avatar, setAvatar] = useState('🐱');
      const [description, setDescription] = useState('');
      const [cliType, setCliType] = useState('claude'); // 'claude' 或 'deepseek'
      const [systemPrompt, setSystemPrompt] = useState('你是一只可爱的猫咪，喜欢帮助人类，用温柔友善的方式回答问题。');

      const avatars = ['🐱', '🐈', '😺', '😸', '😻', '🙀', '😿', '😾', '🐯', '🦁'];

      return (
        <Modal title="注册新猫咪" onClose={onClose}>
          <label>名称 *</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="例如：小橘猫" />

          <label>头像</label>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
            {avatars.map(a => (
              <button key={a} onClick={() => setAvatar(a)} style={{
                fontSize: 24, padding: 8,
                border: avatar === a ? '2px solid #667eea' : '1px solid #ddd',
                borderRadius: 8, background: 'white', cursor: 'pointer'
              }}>{a}</button>
            ))}
          </div>

          <label>CLI 类型</label>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
            <button onClick={() => setCliType('claude')} style={{
              flex: 1, padding: 10,
              border: cliType === 'claude' ? '2px solid #667eea' : '1px solid #ddd',
              borderRadius: 8, background: cliType === 'claude' ? '#f0f4ff' : 'white',
              cursor: 'pointer', textAlign: 'left'
            }}>
              <div style={{ fontWeight: 'bold', marginBottom: 4 }}>🤖 Claude Code CLI</div>
              <div style={{ fontSize: 11, color: '#666' }}>使用 Anthropic Claude API</div>
            </button>
            <button onClick={() => setCliType('deepseek')} style={{
              flex: 1, padding: 10,
              border: cliType === 'deepseek' ? '2px solid #667eea' : '1px solid #ddd',
              borderRadius: 8, background: cliType === 'deepseek' ? '#f0f4ff' : 'white',
              cursor: 'pointer', textAlign: 'left'
            }}>
              <div style={{ fontWeight: 'bold', marginBottom: 4 }}>🧠 DeepSeek CLI</div>
              <div style={{ fontSize: 11, color: '#666' }}>使用 DeepSeek API</div>
            </button>
          </div>

          <label>简介</label>
          <input value={description} onChange={e => setDescription(e.target.value)} placeholder="例如：一只活泼的小猫" />

          <label>个性描述</label>
          <textarea value={systemPrompt} onChange={e => setSystemPrompt(e.target.value)}
            placeholder="描述这只猫咪的性格特点、说话风格等（可选，有默认值）" />

          <div className="modal-buttons">
            <button className="cancel-btn" onClick={onClose}>取消</button>
            <button className="confirm-btn" onClick={() => {
              if (!name.trim()) { alert('请填写猫咪名称'); return; }
              onRegister({ name, avatar, description, systemPrompt, type: cliType });
            }}>注册</button>
          </div>
        </Modal>
      );
    }

    // 角色配置弹窗
    function RolesConfigModal({ threadId, roles, agents, onClose, onSave }) {
      const [editedRoles, setEditedRoles] = useState(roles || {});

      const handleRoleChange = (agentId, role) => {
        setEditedRoles(prev => ({ ...prev, [agentId]: role }));
      };

      const handleSave = async () => {
        try {
          await fetch(`/api/threads/${threadId}/roles`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(editedRoles)
          });
          onSave(editedRoles);
          onClose();
        } catch (err) {
          console.error('保存角色配置失败:', err);
          alert('保存失败');
        }
      };

      return (
        <Modal title="对话角色配置" onClose={onClose}>
          <div style={{ marginBottom: 12, fontSize: 13, color: '#666' }}>
            为这个对话中的猫咪设置角色，例如：PL、开发、Reviewer、测试等
          </div>
          {Object.entries(agents).map(([agentId, agent]) => (
            <div key={agentId} style={{ marginBottom: 12 }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 18 }}>{agent.avatar}</span>
                <span style={{ fontWeight: 500, minWidth: 80 }}>{agent.name}</span>
              </label>
              <input
                value={editedRoles[agentId] || ''}
                onChange={e => handleRoleChange(agentId, e.target.value)}
                placeholder="例如：PL（产品经理）"
                style={{ marginTop: 4 }}
              />
            </div>
          ))}
          <div className="modal-buttons">
            <button className="cancel-btn" onClick={onClose}>取消</button>
            <button className="confirm-btn" onClick={handleSave}>保存</button>
          </div>
        </Modal>
      );
    }

    // Token 使用量面板
    function TokenPanel({ usage, usageHistory }) {
      const history = usageHistory || [];
      const now = new Date();

      // 生成最近10分钟的时间槽（类似 UU 加速器）
      const timelineSlots = [];
      for (let i = 9; i >= 0; i--) {
        const slotTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(),
                                   now.getHours(), now.getMinutes() - i);
        const slotKey = slotTime.getTime();
        const historyEntry = history.find(h => h.minute === slotKey);
        timelineSlots.push({
          minute: slotKey,
          tokens: historyEntry ? historyEntry.tokens : 0,
          label: slotTime.getMinutes(),
          isCurrent: i === 0
        });
      }

      const maxTokens = Math.max(...timelineSlots.map(s => s.tokens), 100);

      return (
        <div style={{
          background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
          borderRadius: 12,
          padding: 12,
          marginBottom: 12,
          color: 'white'
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <span style={{ fontSize: 12, opacity: 0.9 }}>📊 Token 消耗</span>
            <span style={{ fontSize: 14, fontWeight: 600 }}>{usage.total.toLocaleString()}</span>
          </div>

          {/* 每分钟柱状图 - UU 加速器风格 */}
          <div style={{
            display: 'flex',
            alignItems: 'flex-end',
            height: 40,
            gap: 3,
            marginBottom: 4
          }}>
            {timelineSlots.map((slot, i) => {
              const height = maxTokens > 0 ? (slot.tokens / maxTokens) * 100 : 0;
              return (
                <div key={i} style={{
                  flex: 1,
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  gap: 2
                }}>
                  <div style={{
                    width: '100%',
                    height: slot.tokens > 0 ? `${Math.max(height, 10)}%` : 4,
                    minHeight: 4,
                    background: slot.isCurrent
                      ? 'rgba(255,255,255,0.95)'
                      : slot.tokens > 0
                        ? 'rgba(255,255,255,0.6)'
                        : 'rgba(255,255,255,0.2)',
                    borderRadius: 2,
                    transition: 'height 0.3s',
                    boxShadow: slot.isCurrent ? '0 0 8px rgba(255,255,255,0.5)' : 'none'
                  }} />
                </div>
              );
            })}
          </div>

          {/* 时间标签 */}
          <div style={{
            display: 'flex',
            justifyContent: 'space-between',
            fontSize: 8,
            opacity: 0.7,
            marginBottom: 8
          }}>
            <span>{timelineSlots[0].label}分</span>
            <span>现在</span>
          </div>

          {/* 统计数据 */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: '1fr 1fr',
            gap: 8,
            fontSize: 10,
            background: 'rgba(255,255,255,0.1)',
            borderRadius: 8,
            padding: 8
          }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ opacity: 0.7 }}>输入</div>
              <div style={{ fontWeight: 600 }}>{usage.input.toLocaleString()}</div>
            </div>
            <div style={{ textAlign: 'center' }}>
              <div style={{ opacity: 0.7 }}>输出</div>
              <div style={{ fontWeight: 600 }}>{usage.output.toLocaleString()}</div>
            </div>
          </div>
        </div>
      );
    }

    // 对话列表
    function ThreadList({ threads, activeThreadId, onSelect, onDelete, onArchive, onRename, onExport }) {
      const [showArchived, setShowArchived] = useState(false);

      // 分离活跃和已归档的线程
      const activeThreads = threads.filter(t => !t.archived);
      const archivedThreads = threads.filter(t => t.archived);

      // 格式化时间
      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
        if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
        if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;
        return d.toLocaleDateString('zh-CN');
      };

      const handleExport = async (threadId) => {
        window.open(`/api/threads/${threadId}/export`, '_blank');
      };

      return (
        <div className="thread-list">
          {activeThreads.map(thread => (
            <div key={thread.id}
              className={`thread-item ${thread.id === activeThreadId ? 'active' : ''}`}
              onClick={() => onSelect(thread.id)}>
              <span className="title">
                {thread.title || '新对话'}
                <span className="thread-time">{formatTime(thread.lastActivity || thread.updatedAt)}</span>
              </span>
              <div className="thread-actions">
                <button className="thread-action-btn" onClick={e => { e.stopPropagation(); onRename(thread); }} title="重命名">✏️</button>
                <button className="thread-action-btn" onClick={e => { e.stopPropagation(); handleExport(thread.id); }} title="导出">📥</button>
                <button className="thread-action-btn" onClick={e => { e.stopPropagation(); onArchive(thread.id, true); }} title="归档">📁</button>
                <button className="thread-action-btn" onClick={e => { e.stopPropagation(); onDelete(thread.id); }} title="删除">🗑️</button>
              </div>
            </div>
          ))}

          {archivedThreads.length > 0 && (
            <div className="archived-section">
              <div className="archived-header" onClick={() => setShowArchived(!showArchived)}>
                {showArchived ? '▼' : '▶'} 已归档 ({archivedThreads.length})
              </div>
              {showArchived && (
                <div className="archived-list">
                  {archivedThreads.map(thread => (
                    <div key={thread.id}
                      className="thread-item archived"
                      onClick={() => onSelect(thread.id)}>
                      <span className="title">{thread.title || '新对话'}</span>
                      <div className="thread-actions">
                        <button className="thread-action-btn" onClick={e => { e.stopPropagation(); onArchive(thread.id, false); }} title="恢复">↩️</button>
                        <button className="thread-action-btn" onClick={e => { e.stopPropagation(); onDelete(thread.id); }} title="删除">🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // 猫咪面板 - 支持 Steering 模式
    function AgentPanel({ agents, onDelete, onAdd, runningAgents, onToggleSelection, onStopAgent }) {
      const [showModal, setShowModal] = useState(false);

      return (
        <div className="agent-panel">
          <h3>🐱 猫咪们</h3>
          <div className="agent-list">
            {Object.entries(agents).map(([id, agent]) => {
              const isActive = agent.status !== 'idle';
              const isRunning = runningAgents && runningAgents[id];
              const isSelected = agent.selected;
              return (
                <div key={id} className={`agent-item ${isActive ? 'active' : ''} ${isSelected ? 'selected' : ''}`}>
                  {/* Steering 模式：选择框 */}
                  <input
                    type="checkbox"
                    checked={isSelected || false}
                    onChange={() => onToggleSelection && onToggleSelection(id)}
                    style={{ marginRight: 8, cursor: 'pointer' }}
                    title="选中后可同时发送消息给多只猫咪"
                  />
                  <span className="avatar">{agent.avatar}</span>
                  <div className="info" style={{ flex: 1 }}>
                    <div className="name" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      {agent.name}
                      {/* CLI 类型标签 */}
                      {agent.type === 'deepseek' && (
                        <span style={{
                          fontSize: 9,
                          background: '#e8f4ff',
                          color: '#0066cc',
                          padding: '1px 4px',
                          borderRadius: 3
                        }}>DeepSeek</span>
                      )}
                    </div>
                    <div className={`status ${agent.status || 'idle'}`}>
                      <span className={`status-icon ${agent.status || 'idle'}`}></span>
                      {STATUS_ICONS[agent.status] || '💤'} {agent.statusMessage || '等待召唤'}
                    </div>
                    {agent.voice && (
                      <div style={{ fontSize: 10, color: '#999', marginTop: 2 }}>
                        🎵 {agent.voice.description}
                      </div>
                    )}
                  </div>
                  {/* Steering 模式：单独停止按钮 */}
                  {isRunning && (
                    <button

                      style={{
                        padding: '4px 8px',

                        color: 'white',
                        border: 'none',
                        borderRadius: 4,
                        cursor: 'pointer',
                        fontSize: 11,

                      }}

                  )}

                  )}

    // 语音设置面板
    function VoiceSettingsPanel({ autoSpeak, setAutoSpeak }) {

        <div className="voice-settings">
          <span>🔊 自动朗读回复</span>

            className={`voice-toggle ${autoSpeak ? 'active' : ''}`}

          />

    // 词汇表面板
    function VocabularyPanel({ vocabulary, onAdd, onDelete }) {
      const [word, setWord] = useState('');
      const [pronunciation, setPronunciation] = useState('');
      const [expanded, setExpanded] = useState(false);

          onAdd(word.trim(), pronunciation.trim());

          setPronunciation('');

      const vocabCount = Object.keys(vocabulary).length;

      return (
        <div className="vocab-panel">
          <h4 onClick={() => setExpanded(!expanded)}>

          {expanded && (
            <>
              <div className="vocab-list">

            <span>{expanded ? '▼' : '▶'} 🧠 长期记忆 ({memoryItems.length})</span>
          </h4>

            <>
              <div className="memory-list">

    function PendingToolBanner({ pendingTool, onConfirm, onClear }) {

    // 会话控制面板
    function SessionControls({ threadId, onClear }) {
      return (
        <div className="session-controls">
          <button onClick={() => onClear(threadId)} className="danger" title="清除会话状态和待确认操作">
            清除会话
          </button>
        </div>
      );

    // 消息气泡
    function MessageBubble({ message, agentInfo, callerInfo, isStreaming, vocabulary, autoSpeak }) {
      const isUser = message.role === 'user';
      const [showLogs, setShowLogs] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const utteranceRef = useRef(null);

      // 调试日志
      console.log('[MessageBubble] isStreaming:', isStreaming, 'processLogs:', message.processLogs?.length);

      // 高亮 @mentions
      const highlightMentions = (text) => {
        return text.replace(/@([^\s@]+)/g, '<span class="mention">@$1</span>');
      };

      // 格式化时间
      const formatTime = (ts) => {
        const d = new Date(ts);
        return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
      };

      // 应用词汇表替换
      const applyVocabulary = (text) => {
        let result = text;
        for (const [word, pronunciation] of Object.entries(vocabulary || {})) {
          result = result.split(word).join(pronunciation);
        }
        return result;
      };

      // 语音朗读
      const speak = () => {
        if (!window.speechSynthesis) {
          alert('您的浏览器不支持语音合成');
          return;
        }

        if (isSpeaking) {
          window.speechSynthesis.cancel();
          setIsSpeaking(false);
          return;
        }

        const textToSpeak = applyVocabulary(message.content);
        utteranceRef.current = new SpeechSynthesisUtterance(textToSpeak);
        utteranceRef.current.lang = 'zh-CN';

        // 应用猫咪的个性化声音
        if (agentInfo?.voice) {
          utteranceRef.current.pitch = agentInfo.voice.pitch || 1.0;
          utteranceRef.current.rate = agentInfo.voice.rate || 1.0;
        }

        utteranceRef.current.onstart = () => setIsSpeaking(true);
        utteranceRef.current.onend = () => setIsSpeaking(false);
        utteranceRef.current.onerror = () => setIsSpeaking(false);

        window.speechSynthesis.speak(utteranceRef.current);
      };

      // 自动朗读
      useEffect(() => {
        if (autoSpeak && !isUser && !isStreaming && message.content && window.speechSynthesis) {
          const textToSpeak = applyVocabulary(message.content);
          utteranceRef.current = new SpeechSynthesisUtterance(textToSpeak);
          utteranceRef.current.lang = 'zh-CN';
          if (agentInfo?.voice) {
            utteranceRef.current.pitch = agentInfo.voice.pitch || 1.0;
            utteranceRef.current.rate = agentInfo.voice.rate || 1.0;
          }
          utteranceRef.current.onstart = () => setIsSpeaking(true);
          utteranceRef.current.onend = () => setIsSpeaking(false);
          utteranceRef.current.onerror = () => setIsSpeaking(false);
          window.speechSynthesis.speak(utteranceRef.current);
        }
      }, [message.content, isStreaming]);

      const hasLogs = message.processLogs && message.processLogs.length > 0;

      // 流式输出时默认展开日志
      const shouldShowLogs = isStreaming || showLogs;

      return (
        <div className={`message-bubble ${isUser ? 'user' : ''}`}>
          <div className="message-avatar">{isUser ? '👤' : agentInfo?.avatar || '🐱'}</div>
          <div className="message-content">
            {!isUser && (
              <div className="message-sender-wrapper">
                <div className="message-sender">{agentInfo?.name || message.agentId}</div>
                {callerInfo && (
                  <span className="a2a-indicator">
                    <span className="arrow">←</span>
                    {callerInfo.avatar} {callerInfo.name} 呼叫
                  </span>
                )}
              </div>
            )}
            <div
              className="message-text"
              dangerouslySetInnerHTML={{ __html: highlightMentions(message.content) }}
            />
            {/* 朗读按钮 */}
            {!isUser && !isStreaming && window.speechSynthesis && (
              <button
                className={`speak-btn ${isSpeaking ? 'speaking' : ''}`}
                onClick={speak}
                title={isSpeaking ? '停止朗读' : '朗读消息'}
              >
                {isSpeaking ? '🔇' : '🔊'}
              </button>
            )}
            {/* 过程日志面板 */}
            {!isUser && hasLogs && !isStreaming && (
              <div className="process-logs-toggle" onClick={() => setShowLogs(!showLogs)}>
                {showLogs ? '▼' : '▶'} 思考过程 ({message.processLogs.length} 条记录)
              </div>
            )}
            {/* 流式输出时实时显示日志，完成后可折叠 */}
            {!isUser && shouldShowLogs && hasLogs && (
              <div className={`process-logs-panel ${isStreaming ? 'live' : ''}`}>
                {isStreaming && <div style={{ fontSize: 11, color: '#667eea', marginBottom: 6 }}>🔄 实时思考过程</div>}
                {message.processLogs.map((log, idx) => {
                  // 获取工具摘要
                  const getToolSummaryInline = (name, input) => {
                    if (!input) return name;
                    switch (name) {
                      case 'Bash': return `${name}: ${input.command?.slice(0, 50) || ''}`;
                      case 'Read': return `${name}: ${input.file_path?.split('/').pop() || ''}`;
                      case 'Write':
                      case 'Edit': return `${name}: ${input.file_path?.split('/').pop() || ''}`;
                      case 'Grep': return `${name}: "${input.pattern?.slice(0, 30) || ''}"`;
                      case 'Glob': return `${name}: ${input.pattern || ''}`;
                      case 'WebSearch': return `${name}: "${input.query?.slice(0, 40) || ''}"`;
                      case 'WebFetch': return `${name}: ${input.url?.slice(0, 40) || ''}`;
                      case 'Task': return `${name}: ${input.description || input.subagent_type || ''}`;
                      case 'AskUserQuestion': return `${name}: ${input.questions?.[0]?.question?.slice(0, 40) || ''}`;
                      default: return `${name}: ${JSON.stringify(input).slice(0, 40)}`;
                    }
                  };

                  return (
                    <div key={idx} className="process-log-item">
                      <span className={`log-type ${log.type}`}>
                        {log.type === 'thinking' ? '💭 思考' :
                         log.type === 'tool' ? '🔧 工具' : '📊 状态'}
                      </span>
                      <span className="log-content" style={{ fontSize: 11 }}>
                        {log.type === 'thinking' ? (log.text?.slice(0, 100) + (log.text?.length > 100 ? '...' : '')) :
                         log.type === 'tool' ? getToolSummaryInline(log.name, log.input) :
                         log.message}
                      </span>
                      <span className="log-time">{formatTime(log.time)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // 输入框
    function InputBox({ onSend, disabled, onStop, showStop, agents }) {
      const [input, setInput] = useState('');
      const [isRecording, setIsRecording] = useState(false);
      const [showMentionDropdown, setShowMentionDropdown] = useState(false);
      const [mentionSearch, setMentionSearch] = useState('');
      const [mentionStartPos, setMentionStartPos] = useState(-1);
      const inputRef = useRef(null);
      const recognitionRef = useRef(null);

      // 获取可用的 agents 列表
      const agentList = agents ? Object.values(agents) : [];
      const filteredAgents = agentList.filter(agent =>
        agent.name.toLowerCase().includes(mentionSearch.toLowerCase()) ||
        agent.id.toLowerCase().includes(mentionSearch.toLowerCase())
      );

      // 初始化语音识别
      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = false;
          recognitionRef.current.lang = 'zh-CN';

          recognitionRef.current.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setInput(prev => prev + transcript);
          };

          recognitionRef.current.onerror = (event) => {
            console.error('语音识别错误:', event.error);
            setIsRecording(false);
          };

          recognitionRef.current.onend = () => {
            setIsRecording(false);
          };
        }
      }, []);

      // 点击外部关闭下拉菜单
      useEffect(() => {
        const handleClickOutside = (e) => {
          if (inputRef.current && !inputRef.current.contains(e.target)) {
            setShowMentionDropdown(false);
          }
        };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, []);

      const handleInputChange = (e) => {
        const value = e.target.value;
        const cursorPos = e.target.selectionStart;
        setInput(value);

        // 检测 @ 符号
        const lastAtIndex = value.lastIndexOf('@', cursorPos);
        if (lastAtIndex !== -1) {
          // 检查 @ 后面是否有空格（如果有空格说明 @mention 已结束）
          const textAfterAt = value.substring(lastAtIndex + 1, cursorPos);
          if (!textAfterAt.includes(' ')) {
            setMentionStartPos(lastAtIndex);
            setMentionSearch(textAfterAt);
            setShowMentionDropdown(true);
          } else {
            setShowMentionDropdown(false);
          }
        } else {
          setShowMentionDropdown(false);
        }
      };

      const selectMention = (agent) => {
        if (mentionStartPos === -1) return;
        const beforeMention = input.substring(0, mentionStartPos);
        const afterCursor = input.substring(inputRef.current.selectionStart);
        const newInput = beforeMention + '@' + agent.name + ' ' + afterCursor;
        setInput(newInput);
        setShowMentionDropdown(false);
        setMentionStartPos(-1);
        // 聚焦回输入框
        setTimeout(() => {
          inputRef.current?.focus();
          const newPos = beforeMention.length + agent.name.length + 2;
          inputRef.current?.setSelectionRange(newPos, newPos);
        }, 0);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (input.trim() && !disabled) { onSend(input.trim()); setInput(''); }
      };

      const toggleRecording = () => {
        if (!recognitionRef.current) {
          alert('您的浏览器不支持语音识别，请使用 Chrome 或 Edge');
          return;
        }

        if (isRecording) {
          recognitionRef.current.stop();
          setIsRecording(false);
        } else {
          recognitionRef.current.start();
          setIsRecording(true);
        }
      };

      const speechSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

      return (
        <form className="input-form" onSubmit={handleSubmit} style={{ position: 'relative' }}>
          <div style={{ position: 'relative', flex: 1 }}>
            <input
              ref={inputRef}
              type="text"
              value={input}
              onChange={handleInputChange}
              placeholder="输入消息... (@ 选择猫咪，@全体成员 召唤所有)"
              disabled={disabled}
              style={{ width: '100%' }}
            />
            {/* @提及下拉菜单 */}
            {showMentionDropdown && (
              <div style={{
                position: 'absolute',
                bottom: '100%',
                left: 0,
                marginBottom: 4,
                background: 'white',
                border: '1px solid #ddd',
                borderRadius: 8,
                boxShadow: '0 2px 10px rgba(0,0,0,0.15)',
                maxHeight: 200,
                overflowY: 'auto',
                minWidth: 180,
                zIndex: 1000
              }}>
                {/* 全体成员选项 */}
                <div
                  onClick={() => selectMention({ name: '全体成员' })}
                  style={{
                    padding: '8px 12px',
                    cursor: 'pointer',
                    borderBottom: '1px solid #eee',
                    background: '#f0f7ff',
                    fontWeight: 500
                  }}
                  onMouseEnter={(e) => e.target.style.background = '#e0f0ff'}
                  onMouseLeave={(e) => e.target.style.background = '#f0f7ff'}
                >
                  📢 @全体成员
                </div>
                {filteredAgents.map(agent => (
                  <div
                    key={agent.id}
                    onClick={() => selectMention(agent)}
                    style={{
                      padding: '8px 12px',
                      cursor: 'pointer',
                      display: 'flex',
                      alignItems: 'center',
                      gap: 8
                    }}
                    onMouseEnter={(e) => e.target.style.background = '#f5f5f5'}
                    onMouseLeave={(e) => e.target.style.background = 'white'}
                  >
                    <span>{agent.avatar || '🐱'}</span>
                    <span>{agent.name}</span>
                  </div>
                ))}
                {filteredAgents.length === 0 && (
                  <div style={{ padding: '8px 12px', color: '#999' }}>没有匹配的猫咪</div>
                )}
              </div>
            )}
          </div>
          {speechSupported && (
            <button
              type="button"
              className={`voice-btn ${isRecording ? 'recording' : ''}`}
              onClick={toggleRecording}
              disabled={disabled}
              title={isRecording ? '点击停止' : '按住说话'}
            >
              {isRecording ? '⏹️' : '🎤'}
            </button>
          )}
          {showStop && (
            <button type="button" className="stop-btn" onClick={onStop}>停止全部</button>
          )}
          <button type="submit" disabled={disabled || !input.trim()}>
            发送
          </button>
        </form>
      );
    }

    // 加载指示器
    function LoadingIndicator({ agentName, agentStatus, callerInfo }) {
      const icon = STATUS_ICONS[agentStatus] || '🧠';
      return (
        <div className="loading-indicator">
          <span>{icon}</span>
          <span>
            {callerInfo && <span style={{ color: '#667eea' }}>{callerInfo.name} → </span>}
            {agentName} {agentStatus === 'thinking' ? '正在思考...' :
                         agentStatus === 'tool' ? '使用工具中...' :
                         agentStatus === 'streaming' ? '正在回复...' :
                         agentStatus === 'retry' ? '重试中...' : '处理中...'}
          </span>
        </div>
      );
    }

    // 过程日志面板（实时显示）
    function ProcessLogPanel({ logs, isLive }) {
      const [expandedIdx, setExpandedIdx] = useState(null);

      const formatTime = (ts) => {
        const d = new Date(ts);
        return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
      };

      if (!logs || logs.length === 0) return null;

      // 获取工具调用的摘要显示
      const getToolSummary = (name, input) => {
        if (!input) return name;

        // 根据工具类型提取关键信息
        switch (name) {
          case 'Bash':
            return `${name}: ${input.command?.slice(0, 50) || ''}${input.command?.length > 50 ? '...' : ''}`;
          case 'Read':
            return `${name}: ${input.file_path?.split('/').pop() || ''}`;
          case 'Write':
          case 'Edit':
            return `${name}: ${input.file_path?.split('/').pop() || ''}`;
          case 'Grep':
            return `${name}: "${input.pattern?.slice(0, 30) || ''}"`;
          case 'Glob':
            return `${name}: ${input.pattern || ''}`;
          case 'WebSearch':
            return `${name}: "${input.query?.slice(0, 40) || ''}"`;
          case 'WebFetch':
            return `${name}: ${input.url?.slice(0, 40) || ''}`;
          case 'Task':
            return `${name}: ${input.description || input.subagent_type || ''}`;
          default:
            return name;
        }
      };

      // 获取工具调用的详细内容
      const getToolDetail = (name, input) => {
        if (!input) return null;
        switch (name) {
          case 'Bash':
            return `$ ${input.command}`;
          case 'Read':
          case 'Write':
          case 'Edit':
            return `文件: ${input.file_path}`;
          default:
            return JSON.stringify(input, null, 2);
        }
      };

      return (
        <div className={`process-logs-panel ${isLive ? 'live' : ''}`}>
          {isLive && <div style={{ fontSize: 11, color: '#667eea', marginBottom: 6 }}>🔄 实时思考过程</div>}
          {logs.map((log, idx) => {
            const isExpanded = expandedIdx === idx;

            // 判断是否有详细内容可展开（默认展开所有 thinking 内容）
            const hasDetail = (log.type === 'thinking' && log.text?.length > 50) ||
                             (log.type === 'tool' && log.input);

            // 获取摘要内容
            const getSummary = () => {
              if (log.type === 'thinking') {
                // 思考内容显示更多（200字符）
                return log.text?.slice(0, 200) + (log.text?.length > 200 ? '...' : '');
              }
              if (log.type === 'tool') {
                return getToolSummary(log.name, log.input);
              }
              if (log.type === 'status') {
                // status 类型显示消息
                return log.message || log.status;
              }
              return log.message;
            };

            // 获取详细内容
            const getDetail = () => {
              if (log.type === 'thinking') {
                return log.text;
              }
              if (log.type === 'tool') {
                return getToolDetail(log.name, log.input);
              }
              return null;
            };

            // 获取图标
            const getIcon = () => {
              if (log.type === 'thinking') return '💭';
              if (log.type === 'tool') return '🔧';
              if (log.type === 'status') {
                if (log.status === 'thinking') return '🧠';
                if (log.status === 'streaming') return '✍️';
                if (log.status === 'idle') return '✅';
                if (log.status === 'retry') return '🔄';
                return '📊';
              }
              return '📊';
            };

            return (
              <div key={idx} className="process-log-item">
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 4 }}>
                  <span className={`log-type ${log.type}`}>
                    {getIcon()}
                  </span>
                  <span className="log-content" style={{ flex: 1, fontSize: 11 }}>
                    {getSummary()}
                  </span>
                  {hasDetail && (
                    <span
                      style={{ cursor: 'pointer', color: '#667eea', fontSize: 10, flexShrink: 0 }}
                      onClick={() => setExpandedIdx(isExpanded ? null : idx)}
                    >
                      {isExpanded ? '收起' : '详情'}
                    </span>
                  )}
                  <span className="log-time">{formatTime(log.time)}</span>
                </div>
                {isExpanded && hasDetail && (
                  <pre style={{
                    margin: '8px 0 0 20px',
                    padding: '8px',
                    background: '#fff',
                    borderRadius: '4px',
                    fontSize: '11px',
                    whiteSpace: 'pre-wrap',
                    wordBreak: 'break-word',
                    maxHeight: '300px',
                    overflow: 'auto',
                    border: '1px solid #eee'
                  }}>
                    {getDetail()}
                  </pre>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // MCP 面板组件
    function MCPPanel({ servers, onAdd, onDelete, onStart, onStop }) {
      const [expanded, setExpanded] = useState(false);
      const [showAddForm, setShowAddForm] = useState(false);
      const [formData, setFormData] = useState({
        name: '',
        type: 'stdio',
        command: '',
        args: '',
        url: ''
      });

      const handleSubmit = () => {
        if (!formData.name) return;
        onAdd({
          name: formData.name,
          type: formData.type,
          command: formData.type === 'stdio' ? formData.command : undefined,
          args: formData.args ? formData.args.split(' ').filter(Boolean) : [],
          url: formData.type === 'http' ? formData.url : undefined
        });
        setFormData({ name: '', type: 'stdio', command: '', args: '', url: '' });
        setShowAddForm(false);
      };

      return (
        <div className="mcp-panel">
          <h4 onClick={() => setExpanded(!expanded)}>
            <span>🔌 MCP 服务器 ({servers.length})</span>
            <span>{expanded ? '▼' : '▶'}</span>
          </h4>

          {expanded && (
            <>
              <div className="mcp-server-list">
                {servers.map(server => (
                  <div key={server.id} className="mcp-server-item">
                    <div className="header">
                      <span className="name">
                        {server.name}
                        <span className={`status-badge ${server.status}`}>
                          {server.status === 'running' ? '运行中' :
                           server.status === 'starting' ? '启动中' :
                           server.status === 'error' ? '错误' : '已停止'}
                        </span>
                      </span>
                    </div>
                    <div style={{ fontSize: 10, color: '#666' }}>
                      类型: {server.type}
                      {server.type === 'stdio' && server.command && ` | 命令: ${server.command}`}
                      {server.type === 'http' && server.url && ` | URL: ${server.url}`}
                    </div>
                    <div className="actions">
                      {server.status === 'running' ? (
                        <button onClick={() => onStop(server.id)}>停止</button>
                      ) : (
                        <button className="primary" onClick={() => onStart(server.id)}>启动</button>
                      )}
                      <button className="danger" onClick={() => onDelete(server.id)}>删除</button>
                    </div>
                  </div>
                ))}
                {servers.length === 0 && (
                  <div style={{ color: '#999', textAlign: 'center', padding: 8 }}>
                    暂无 MCP 服务器
                  </div>
                )}
              </div>

              {showAddForm ? (
                <div className="mcp-add-form">
                  <input
                    placeholder="服务器名称"
                    value={formData.name}
                    onChange={e => setFormData({ ...formData, name: e.target.value })}
                  />
                  <select
                    value={formData.type}
                    onChange={e => setFormData({ ...formData, type: e.target.value })}
                  >
                    <option value="stdio">Stdio</option>
                    <option value="http">HTTP/SSE</option>
                  </select>
                  {formData.type === 'stdio' ? (
                    <>
                      <input
                        placeholder="命令 (如: npx)"
                        value={formData.command}
                        onChange={e => setFormData({ ...formData, command: e.target.value })}
                      />
                      <input
                        placeholder="参数 (空格分隔)"
                        value={formData.args}
                        onChange={e => setFormData({ ...formData, args: e.target.value })}
                      />
                    </>
                  ) : (
                    <input
                      placeholder="服务器 URL"
                      value={formData.url}
                      onChange={e => setFormData({ ...formData, url: e.target.value })}
                    />
                  )}
                  <div className="form-row">
                    <button onClick={() => setShowAddForm(false)}>取消</button>
                    <button className="primary" onClick={handleSubmit}>添加</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setShowAddForm(true)} style={{ width: '100%', padding: 4 }}>
                  + 添加服务器
                </button>
              )}
            </>
          )}
        </div>
      );
    }

    // Skill 面板组件
    function SkillPanel({ skills, templates, agents, skillAssignments, onAdd, onDelete, onExecute, onUpdateAssignment }) {
      const [expanded, setExpanded] = useState(false);
      const [showAddForm, setShowAddForm] = useState(false);
      const [addMode, setAddMode] = useState('template'); // 'template' or 'custom'
      const [selectedTemplate, setSelectedTemplate] = useState(null);
      const [selectedSkill, setSelectedSkill] = useState(null); // 查看技能详情
      const [editingAssignment, setEditingAssignment] = useState(null); // 编辑授权
      const [selectedAgentIds, setSelectedAgentIds] = useState([]); // 选中的 agent IDs
      const [formData, setFormData] = useState({
        name: '',
        description: '',
        type: 'http',
        method: 'GET',
        urlTemplate: '',
        script: ''
      });

      const handleCreateFromTemplate = () => {
        if (!selectedTemplate) return;
        onAdd({
          templateId: selectedTemplate.id,
          name: formData.name || selectedTemplate.name,
          description: formData.description || selectedTemplate.description
        });
        setSelectedTemplate(null);
        setFormData({ name: '', description: '', type: 'http', method: 'GET', urlTemplate: '', script: '' });
        setShowAddForm(false);
      };

      const handleCreateCustom = () => {
        if (!formData.name) return;
        onAdd({
          name: formData.name,
          description: formData.description,
          type: formData.type,
          config: formData.type === 'http' ? {
            method: formData.method,
            urlTemplate: formData.urlTemplate
          } : {
            script: formData.script
          }
        });
        setFormData({ name: '', description: '', type: 'http', method: 'GET', urlTemplate: '', script: '' });
        setShowAddForm(false);
      };

      const handleViewSkill = async (skill) => {
        if (skill.type === 'prompt') {
          // 对于 prompt 类型，执行并显示内容
          try {
            const res = await fetch(`/api/skills/${skill.id}/execute`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ params: {} })
            });
            const result = await res.json();
            if (result.success) {
              setSelectedSkill({ ...skill, promptContent: result.prompt });
            }
          } catch (err) {
            console.error('获取技能内容失败:', err);
          }
        } else {
          setSelectedSkill(skill);
        }
      };

      // 按分类分组技能
      const skillsByCategory = skills.reduce((acc, skill) => {
        const cat = skill.category || 'custom';
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(skill);
        return acc;
      }, {});

      const categoryNames = {
        'code_review': '📝 Code Review',
        'search': '🔍 搜索',
        'network': '🌐 网络',
        'data': '📊 数据',
        'analysis': '📈 分析',
        'utility': '🔧 工具',
        'language': '🌍 语言',
        'custom': '⭐ 自定义'
      };

      return (
        <div className="skill-panel">
          <h4 onClick={() => setExpanded(!expanded)}>
            <span>⚡ Skills ({skills.length})</span>
            <span>{expanded ? '▼' : '▶'}</span>
          </h4>

          {expanded && (
            <>
              {editingAssignment ? (
                // 编辑授权视图
                <div className="skill-detail">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                    <span style={{ fontWeight: 500 }}>授权: {editingAssignment.name}</span>
                    <button onClick={() => { setEditingAssignment(null); setSelectedAgentIds([]); }} style={{ padding: '2px 8px', fontSize: 10 }}>取消</button>
                  </div>
                  <div style={{ fontSize: 10, color: '#666', marginBottom: 8 }}>
                    选择可以使用此技能的猫咪：
                  </div>
                  <div style={{ maxHeight: 200, overflow: 'auto', marginBottom: 8 }}>
                    {Object.values(agents || {}).map(agent => {
                      const currentAssignments = skillAssignments[editingAssignment.id] || [];
                      const isAssigned = currentAssignments.some(a => (a.id || a) === agent.id);
                      return (
                        <label key={agent.id} style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: 8,
                          padding: '4px 8px',
                          marginBottom: 2,
                          background: isAssigned ? '#e0f0ff' : '#f8f9fa',
                          borderRadius: 4,
                          cursor: 'pointer',
                          fontSize: 11
                        }}>
                          <input
                            type="checkbox"
                            checked={isAssigned}
                            onChange={async () => {
                              const currentIds = (skillAssignments[editingAssignment.id] || []).map(a => a.id || a);
                              const newIds = isAssigned
                                ? currentIds.filter(id => id !== agent.id)
                                : [...currentIds, agent.id];
                              await onUpdateAssignment(editingAssignment.id, newIds);
                            }}
                          />
                          <span>{agent.avatar || '🐱'} {agent.name}</span>
                        </label>
                      );
                    })}
                  </div>
                  <div style={{ fontSize: 9, color: '#999', borderTop: '1px solid #eee', paddingTop: 8 }}>
                    已授权: {(skillAssignments[editingAssignment.id] || []).length} 只猫咪
                  </div>
                </div>
              ) : selectedSkill ? (
                // 技能详情视图
                <div className="skill-detail">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                    <span style={{ fontWeight: 500 }}>{selectedSkill.name}</span>
                    <button onClick={() => setSelectedSkill(null)} style={{ padding: '2px 8px', fontSize: 10 }}>返回</button>
                  </div>

                  {selectedSkill.triggers && selectedSkill.triggers.length > 0 && (
                    <div style={{ marginBottom: 8 }}>
                      <div style={{ fontSize: 10, color: '#666', marginBottom: 4 }}>触发词：</div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                        {selectedSkill.triggers.map(t => (
                          <span key={t} style={{
                            background: '#e0f0ff',
                            padding: '2px 6px',
                            borderRadius: 4,
                            fontSize: 9,
                            color: '#667eea'
                          }}>{t}</span>
                        ))}
                      </div>
                    </div>
                  )}

                  {selectedSkill.promptContent && (
                    <div style={{
                      background: '#f8f9fa',
                      padding: 8,
                      borderRadius: 4,
                      fontSize: 10,
                      maxHeight: 300,
                      overflow: 'auto',
                      whiteSpace: 'pre-wrap'
                    }}>
                      {selectedSkill.promptContent}
                    </div>
                  )}

                  {!selectedSkill.promptContent && (
                    <div style={{ fontSize: 10, color: '#666' }}>
                      {selectedSkill.description}
                    </div>
                  )}
                </div>
              ) : (
                <>
                  {/* 按分类显示技能列表 */}
                  {Object.entries(skillsByCategory).map(([category, categorySkills]) => (
                    <div key={category} style={{ marginBottom: 8 }}>
                      <div style={{ fontSize: 10, color: '#667eea', fontWeight: 500, marginBottom: 4 }}>
                        {categoryNames[category] || category} ({categorySkills.length})
                      </div>
                      {categorySkills.map(skill => {
                        const assignedAgents = skillAssignments[skill.id] || [];
                        return (
                          <div key={skill.id} className="skill-item" style={{ marginBottom: 4 }}>
                            <div className="header">
                              <span className="name">
                                {skill.name}
                                {skill.isTemplate && <span style={{ fontSize: 8, color: '#28a745', marginLeft: 4 }}>内置</span>}
                              </span>
                              <span style={{ fontSize: 9, color: assignedAgents.length > 0 ? '#667eea' : '#999' }}>
                                {assignedAgents.length} 只猫
                              </span>
                            </div>
                            {skill.triggers && skill.triggers.length > 0 && (
                              <div style={{ fontSize: 9, color: '#667eea', marginTop: 2 }}>
                                触发: {skill.triggers.slice(0, 2).join(', ')}{skill.triggers.length > 2 && '...'}
                              </div>
                            )}
                            {assignedAgents.length > 0 && (
                              <div style={{ fontSize: 8, color: '#666', marginTop: 2, display: 'flex', flexWrap: 'wrap', gap: 2 }}>
                                {assignedAgents.slice(0, 3).map(a => (
                                  <span key={a.id} style={{ background: '#f0f7ff', padding: '1px 4px', borderRadius: 2 }}>
                                    {a.avatar || '🐱'} {a.name}
                                  </span>
                                ))}
                                {assignedAgents.length > 3 && <span style={{ color: '#999' }}>+{assignedAgents.length - 3}</span>}
                              </div>
                            )}
                            <div className="actions">
                              <button onClick={() => handleViewSkill(skill)}>查看</button>
                              <button
                                onClick={() => setEditingAssignment(skill)}
                                style={{ background: assignedAgents.length > 0 ? '#667eea' : '#f0f0f0', color: assignedAgents.length > 0 ? 'white' : '#333' }}
                              >
                                授权
                              </button>
                              {!skill.isTemplate && (
                                <button className="danger" onClick={() => onDelete(skill.id)}>删除</button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}

                  {skills.length === 0 && (
                    <div style={{ color: '#999', textAlign: 'center', padding: 8 }}>
                      暂无 Skills
                    </div>
                  )}

                  {showAddForm ? (
                    <div className="skill-add-form" style={{ marginTop: 12, borderTop: '1px solid #eee', paddingTop: 8 }}>
                      <div className="form-row">
                        <button
                          style={{ background: addMode === 'template' ? '#667eea' : '#f0f0f0', color: addMode === 'template' ? 'white' : '#333' }}
                          onClick={() => setAddMode('template')}
                        >
                          从模板创建
                        </button>
                        <button
                          style={{ background: addMode === 'custom' ? '#667eea' : '#f0f0f0', color: addMode === 'custom' ? 'white' : '#333' }}
                          onClick={() => setAddMode('custom')}
                        >
                          自定义
                        </button>
                      </div>

                      {addMode === 'template' ? (
                        <>
                          <div className="template-grid">
                            {templates.filter(t => t.type !== 'prompt').map(t => (
                              <div
                                key={t.id}
                                className={`template-item ${selectedTemplate?.id === t.id ? 'selected' : ''}`}
                                onClick={() => setSelectedTemplate(t)}
                              >
                                <div className="name">{t.name}</div>
                                <div className="desc">{t.description}</div>
                              </div>
                            ))}
                          </div>
                          {selectedTemplate && (
                            <>
                              <input
                                placeholder="自定义名称 (可选)"
                                value={formData.name}
                                onChange={e => setFormData({ ...formData, name: e.target.value })}
                              />
                              <input
                                placeholder="自定义描述 (可选)"
                                value={formData.description}
                                onChange={e => setFormData({ ...formData, description: e.target.value })}
                              />
                            </>
                          )}
                        </>
                      ) : (
                        <>
                          <input
                            placeholder="名称"
                            value={formData.name}
                            onChange={e => setFormData({ ...formData, name: e.target.value })}
                          />
                          <input
                            placeholder="描述"
                            value={formData.description}
                            onChange={e => setFormData({ ...formData, description: e.target.value })}
                          />
                          <select
                            value={formData.type}
                            onChange={e => setFormData({ ...formData, type: e.target.value })}
                          >
                            <option value="http">HTTP 请求</option>
                            <option value="python">Python 脚本</option>
                          </select>
                          {formData.type === 'http' ? (
                            <>
                              <select
                                value={formData.method}
                                onChange={e => setFormData({ ...formData, method: e.target.value })}
                              >
                                <option value="GET">GET</option>
                                <option value="POST">POST</option>
                                <option value="PUT">PUT</option>
                                <option value="DELETE">DELETE</option>
                              </select>
                              <input
                                placeholder="URL 模板 (如: https://api.example.com?q={query})"
                                value={formData.urlTemplate}
                                onChange={e => setFormData({ ...formData, urlTemplate: e.target.value })}
                              />
                            </>
                          ) : (
                            <textarea
                              placeholder="Python 脚本 (使用 result 变量返回结果)"
                              value={formData.script}
                              onChange={e => setFormData({ ...formData, script: e.target.value })}
                              rows={4}
                            />
                          )}
                        </>
                      )}

                      <div className="form-row">
                        <button onClick={() => setShowAddForm(false)}>取消</button>
                        <button className="primary" onClick={addMode === 'template' ? handleCreateFromTemplate : handleCreateCustom}>
                          创建
                        </button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => setShowAddForm(true)} style={{ width: '100%', padding: 4, marginTop: 8 }}>
                      + 添加自定义 Skill
                    </button>
                  )}
                </>
              )}
            </>
          )}
        </div>
      );
    }

    // 工具授权面板组件
    function ToolAuthorizationPanel({ agentId, mcpTools, skills, currentAuth, onUpdate }) {
